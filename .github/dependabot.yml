version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: 'deps'
    ignore:
      # Expo manages these package families through the SDK release train.
      - dependency-name: 'expo'
      - dependency-name: 'expo-*'
      - dependency-name: '@expo/*'
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
      - dependency-name: 'react-native'
      - dependency-name: 'react-native-*'
      - dependency-name: '@react-native-*'
      - dependency-name: '@types/react'
      - dependency-name: 'typescript'
      - dependency-name: 'eslint-config-expo'
      - dependency-name: '@sentry/react-native'
      # Majors held back until the Expo toolchain supports them
      # (babel-preset-expo/Metro are on Babel 7; eslint-config-expo targets ESLint 9).
      - dependency-name: '@babel/core'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:15'
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'ci'
